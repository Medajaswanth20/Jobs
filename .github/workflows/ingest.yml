name: Job Ingestion

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # manual trigger from GitHub Actions UI

jobs:
  ingest:
    name: Fetch & Ingest Jobs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Run ingestion
        working-directory: ingestion
        run: python main.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Report summary
        if: always()
        run: echo "Ingestion workflow completed at $(date)"
